; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32 @6.5.0
board = esp32s3_flash_16MB
framework = arduino
monitor_speed = 115200 ;Serial Baud Rate Setting
lib_deps = 
    https://github.com/gb88/BLEOTA.git

; debug_tool = esp-builtin
; upload_protocol = esp-builtin
upload_speed = 921600 ; 460800, 512000, 460800, 256000, 115200
board_upload.flash_size = 16MB 

board_build.arduino.memory_type = qio_opi ;Enable internal PSRAM
; board_build.arduino.memory_type = qio_qspi ;Enable external PSRAM

board_build.arduino.partitions = default_16MB.csv 

build_src_flags =
    -Wall ;项目源码启用常规告警
    -Wextra ;项目源码启用额外告警

build_flags = 
    -std=gnu++17
    ; -Werror ;将告警视为错误，稳定后再开启
    -D CORE_DEBUG_LEVEL=1 ;调试级别 0-5
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1 ;1 表示把 USB 口作为串口使用
    -D ARDUINO_RUNNING_CORE=1       ; Arduino setup/loop 运行核心
    -D ARDUINO_EVENT_RUNNING_CORE=1 ; Arduino 事件运行核心

[platformio]
boards_dir = ./boards
lib_dir = ./libraries

src_dir = src
; default_envs = can
default_envs = main

; src_dir = debug/examples/${platformio.default_envs}
; default_envs = chip_scan

[env:can]
build_src_filter =
    +<*>
    -<main.cpp>

[env:main]
build_src_filter =
    +<main.cpp>
    -<can.ino>
    -<can.ino.cpp>

[env:original_test]

[env:chip_scan]
[env:can_b_replay]
build_src_filter =
    +<can_b_replay.cpp>
    -<main.cpp>
    -<can.ino>
    -<can.ino.cpp>

[env:analyzer]
board_build.filesystem = littlefs
build_src_filter =
    +<can_analyzer.cpp>
    +<analyzer/>
    -<main.cpp>
    -<can.ino>
    -<can.ino.cpp>
    -<can_b_replay.cpp>
lib_deps =
    ${env.lib_deps}
    ESP32Async/ESPAsyncWebServer
    ESP32Async/AsyncTCP
    bblanchon/ArduinoJson

[env:native]
platform = native
framework =
test_framework = unity
test_build_src = yes
lib_deps =
build_flags =
    -std=gnu++17
    -D NATIVE_BUILD
    -I include
    -I src
build_src_filter =
    -<*>
    +<analyzer/frame_queue.cpp>
    +<analyzer/id_table.cpp>
    +<analyzer/ws_protocol.cpp>

